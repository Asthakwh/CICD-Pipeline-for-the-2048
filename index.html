<!DOCTYPE html>
<html>
<head>
    <title>Simple Click Game</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f0f8ff;
        }

        h1 {
            color: #2c3e50;
        }

        #gameArea {
            width: 400px;
            height: 300px;
            margin: 20px auto;
            border: 2px solid #3498db;
            position: relative;
            background-color: #ecf0f1;
        }

        #box {
            width: 50px;
            height: 50px;
            background-color: #e74c3c;
            position: absolute;
            cursor: pointer;
        }

        #score {
            font-size: 20px;
            color: #27ae60;
        }

        #timer {
            font-size: 18px;
            color: #8e44ad;
        }

        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>

<h1>🎮 Click the Box Game</h1>

<p id="score">Score: 0</p>
<p id="timer">Time: 10</p>

<button onclick="startGame()">Start Game</button>

<div id="gameArea">
    <div id="box" onclick="increaseScore()"></div>
</div>

<script>
    let score = 0;
    let timeLeft = 10;
    let gameInterval;

    function moveBox() {
        let box = document.getElementById("box");
        let x = Math.random() * 350;
        let y = Math.random() * 250;

        box.style.left = x + "px";
        box.style.top = y + "px";
    }

    function increaseScore() {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        moveBox();
    }

    function startGame() {
        score = 0;
        timeLeft = 10;
        document.getElementById("score").innerText = "Score: 0";
        document.getElementById("timer").innerText = "Time: 10";

        moveBox();

        gameInterval = setInterval(() => {
            timeLeft--;
            document.getElementById("timer").innerText = "Time: " + timeLeft;

            if (timeLeft <= 0) {
                clearInterval(gameInterval);
                alert("Game Over! Your score is " + score);
            }
        }, 1000);
    }
</script>

</body>
</html>
