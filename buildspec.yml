version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 024239493672.dkr.ecr.ap-south-1.amazonaws.com/2048-game-repo
  build:
    commands:
      - echo Building the Docker image...
      - docker build -t game2048 .
      - echo Tagging the Docker image...
      - docker tag game2048:latest 024239493672.dkr.ecr.ap-south-1.amazonaws.com/2048-game-repo:latest
  post_build:
    commands:
      - echo Pushing the Docker image to Amazon ECR...
      - docker push 024239493672.dkr.ecr.ap-south-1.amazonaws.com/2048-game-repo:latest
      - echo Creating imagedefinitions.json file for ECS deployment...
      - echo '[{"name":"game2048","imageUri":"024239493672.dkr.ecr.ap-south-1.amazonaws.com/2048-game-repo"}]' > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
