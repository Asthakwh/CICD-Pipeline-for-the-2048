version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 024239493672.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Building the Docker image...
      - docker build -t Box-Game .
      - echo Tagging the Docker image...
      - docker tag Box-Game:latest 024239493672.dkr.ecr.ap-south-1.amazonaws.com/Box-Game:latest

  post_build:
    commands:
      - echo Pushing the Docker image to Amazon ECR...
      - docker push 024239493672.dkr.ecr.ap-south-1.amazonaws.com/Box-Game:latest
      - echo Creating imagedefinitions.json file for ECS deployment...
      - printf '[{"name":"Box-Game","imageUri":"%s"}]' 024239493672.dkr.ecr.ap-south-1.amazonaws.com/Box-Game:latest > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
